<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practica 5 - PHP y PERL/CGI</title>
<style>
body { font-family: Arial, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
.form-group { margin-bottom: 1rem; }
label { display: block; font-weight: bold; margin-bottom: 4px; }
input, textarea { width: 100%; padding: 8px; border: 1px solid #058842; border-radius: 4px; box-sizing: border-box; }
.btn-group { display: flex; gap: 12px; margin-top: 1rem; }
button { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; color: rgb(241, 241, 241); }
.btn-php { background: #df04e6; }
.btn-perl { background: #038903; }
button:hover { opacity: 0.88; }
</style>
</head>
<body>
<h1>Formulario de registro mediante  PHP y PERL/CGI</h1>
<p>Completa todos los campos. Prueba con PHP o con PERL/CGI.</p>

<form id="formulario" method="POST">
<div class="form-group">
<label for="nombre">Nombre completo *</label>
<input type="text" id="nombre" name="nombre" placeholder="Ej:Gleiston Ulloa" maxlength="100">
</div>

<div class="form-group">
<label for="email">Correo electronico *</label>
<input type="email" id="email" name="email" placeholder="gleiston.ulloa@uteq.edu.ec">
</div>

<div class="form-group">
<label for="edad">Edad (1-100) *</label>
<input type="number" id="edad" name="edad" min="1" max="100" placeholder="Ej: 40">
</div>

<div class="form-group">
<label for="mensaje">Mensaje *</label>
<textarea id="mensaje" name="mensaje" rows="4" maxlength="500" placeholder="Escribe tu mensaje aqui..."></textarea>
</div>

<div class="btn-group">
<button type="submit" class="btn-php" formaction="procesar.php">Enviar con PHP</button>
<button type="submit" class="btn-perl" formaction="http://localhost:8081/procesar.pl">Enviar con PERL/CGI</button>
</div>
</form>

<hr>
<p style="font-size:0.85rem; color:#0a0000;">Web aplication - UTEQ 2025-2026</p>
</body>
</html>
